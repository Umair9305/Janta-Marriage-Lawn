<h1>Admin Panel</h1>

<table border="1">
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for b in bookings %}
<tr>
    <td>{{ b.name }}</td>
    <td>{{ b.date }}</td>
    <td>{{ b.status }}</td>
    <td>
        {% if b.status == 'pending' %}
        <a href="/approve/{{ b.id }}">Approve</a>
        {% endif %}
    </td>
</tr>
{% endfor %}
</table>
