<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Booking</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('/static/images/room-bg.jpg') no-repeat center center/cover;
    height: 100vh;
}

/* overlay effect */
.overlay {
    background: rgba(0,0,0,0.6);
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* form box */
.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h2 {
    margin-bottom: 15px;
}

/* inputs */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #28a745, #218838);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* back button */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #fff;
    padding: 8px 15px;
    border-radius: 20px;
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* message */
#msg {
    margin-top: 10px;
    font-weight: bold;
}

    body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background: url('/static/images/roomback.jpg') no-repeat center center/cover;
    height: 100vh;
}
</style>
</head>

<body>

<a href="/" class="back-btn">⬅ Back to Home</a>

<div class="overlay">
    <div class="container">
        <h2>🏨 Book a Room</h2>

        <input type="text" id="name" placeholder="Your Name">
        <input type="text" id="phone" placeholder="Phone">

        <label>Check-in:</label>
        <input type="date" id="checkin">

        <label>Check-out:</label>
        <input type="date" id="checkout">

        <select id="room">
            <option value="Single Room">Single Room</option>
            <option value="Double Room">Double Room</option>
            <option value="Deluxe Room">Deluxe Room</option>
        </select>

        <button onclick="bookRoom()">Book Room</button>

        <p id="msg"></p>
    </div>
</div>

<script>
function bookRoom() {

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;
    let room = document.getElementById("room").value;

    if (!name || !phone || !checkin || !checkout) {
        document.getElementById("msg").innerText = "All fields are required!";
        return;
    }

    if (checkout <= checkin) {
        document.getElementById("msg").innerText = "Check-out must be after Check-in!";
        return;
    }

    fetch('/room-book', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name,
            phone: phone,
            check_in: checkin,
            check_out: checkout,
            room_type: room
        })
    })
    .then(res => res.json())
    .then(response => {
        if (response.success) {
            document.getElementById("msg").innerText = "✅ Room booked successfully!";
        } else {
            document.getElementById("msg").innerText = "❌ " + response.message;
        }
    })
    .catch(() => {
        document.getElementById("msg").innerText = "Server error!";
    });
}
</script>

</body>
</html>
