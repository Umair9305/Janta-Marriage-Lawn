<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Room Booking</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #218838;
}

#msg {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>🏨 Book a Room</h2>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone">

    <label>Check-in:</label>
    <input type="date" id="checkin">

    <label>Check-out:</label>
    <input type="date" id="checkout">

    <select id="room">
        <option value="Single Room">Single Room</option>
        <option value="Double Room">Double Room</option>
        <option value="Deluxe Room">Deluxe Room</option>
    </select>

    <button onclick="bookRoom()">Book Room</button>

    <p id="msg"></p>
</div>

<script>
function bookRoom() {

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let checkin = document.getElementById("checkin").value;
    let checkout = document.getElementById("checkout").value;
    let room = document.getElementById("room").value;

    if (!name || !phone || !checkin || !checkout) {
        document.getElementById("msg").innerText = "All fields are required!";
        return;
    }

    if (checkout <= checkin) {
        document.getElementById("msg").innerText = "Check-out must be after Check-in!";
        return;
    }

    fetch('/room-book', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: name,
            phone: phone,
            check_in: checkin,
            check_out: checkout,
            room_type: room
        })
    })
    .then(res => res.json())
    .then(response => {
        if (response.success) {
            document.getElementById("msg").innerText = "✅ Room booked successfully!";
        } else {
            document.getElementById("msg").innerText = "❌ " + response.message;
        }
    })
    .catch(() => {
        document.getElementById("msg").innerText = "Server error!";
    });
}
</script>

</body>
</html>
