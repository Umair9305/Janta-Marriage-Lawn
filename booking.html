<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - Janta Marriage Lawn</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .navbar { background: rgba(26, 26, 26, 0.95); backdrop-filter: blur(10px); }
        
        .hero-booking {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1519741497674-611027288377?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;
            padding: 140px 0 90px;
            text-align: center;
        }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--gold); }
        
        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #fff;
            padding: 14px 20px;
            border-radius: 12px;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            background: rgba(255,255,255,0.15);
        }
        
        .btn-gold {
            background: linear-gradient(45deg, #d4af37, #f0d38a);
            color: #000;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 50px;
            transition: all 0.4s;
        }
        
        .btn-gold:hover {
            transform: scale(1.06);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }
        
        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            width: 70px;
            height: 3px;
            background: var(--gold);
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
        }

          .btn-back {
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 600;
        }

        .btn-back:hover {
            background: var(--gold);
            color: #000;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="/">Janta Marriage Lawn</a>
            <a href="/" class="btn btn-back">← Back to Home</a>

        </div>
    </nav>

    <div class="hero-booking">
        <div class="container">
            <h1 class="display-4">Book Your Dream Event</h1>
            <p class="lead mt-3">Secure your date with Janta Marriage Lawn</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row g-5">

            <!-- Left Side: Check Availability -->
            <div class="col-lg-5">
                <div class="card p-4 p-md-5">
                    <h2 class="section-title mb-4 text-center">Check Availability</h2>
                    <div class="mb-3">
                        <label class="form-label">Select Date</label>
                        <input type="date" id="date" class="form-control">
                    </div>
                    <button onclick="checkDate()" class="btn btn-gold w-100 py-3">Check Date Availability</button>
                    <div id="status" class="mt-4 text-center fw-bold fs-5"></div>
                </div>
            </div>

            <!-- Right Side: Booking Form -->
            <div class="col-lg-7">
                <div class="card p-4 p-md-5">
                    <h3 class="section-title mb-4">Complete Your Booking</h3>
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" id="name" class="form-control" placeholder="Enter your name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" id="phone" class="form-control" placeholder="e.g. 9876543210">
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label class="form-label">Event Date</label>
                            <input type="date" id="eventDate" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Event Time</label>
                            <input type="time" id="eventTime" class="form-control">
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Event Type</label>
                        <select id="event" class="form-select">
                            <option value="Wedding">Wedding Ceremony</option>
                            <option value="Reception">Wedding Reception</option>
                            <option value="Birthday">Birthday Party</option>
                            <option value="Anniversary">Anniversary</option>
                            <option value="Corporate">Corporate Event</option>
                            <option value="Engagement">Engagement</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Number of Guests (approx)</label>
                        <input type="number" id="guests" class="form-control" placeholder="e.g. 250" min="50" value="200">
                    </div>

                    <div class="mt-4">
                        <label class="form-label">How would you like to proceed?</label>
                        <div class="d-grid gap-3">
                            <!-- Book Now Button -->
                            <button onclick="book()" class="btn btn-gold btn-lg">
                                <i class="bi bi-calendar-check"></i> Confirm Booking Request
                            </button>
                            
                            <!-- WhatsApp Button -->
                            <button onclick="bookViaWhatsApp()" class="btn btn-whatsapp btn-lg">
                                📲 Book via WhatsApp (Fastest)
                            </button>
                        </div>
                    </div>

                    <!-- Online Payment Option -->
                    <div class="mt-4 pt-3 border-top border-secondary">
                        <p class="mb-2 text-center text-light">Or Pay Advance Online</p>
                        <div class="d-flex gap-3 justify-content-center">
                            <button onclick="makePayment()" class="btn btn-outline-light flex-fill">
                                💳 Pay ₹25,000 Advance (Razorpay)
                            </button>
                        </div>
                        <small class="text-center d-block mt-2 opacity-75">Secure payment • Instant confirmation</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border border-gold">
                <div class="modal-header border-bottom border-gold">
                    <h5 class="modal-title text-gold">🎉 Booking Request Sent!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <p id="modalMessage" class="fs-5"></p>
                    <p class="text-light">Our team will contact you shortly via call or WhatsApp.</p>
                </div>
                <div class="modal-footer border-top border-gold">
                    <button type="button" class="btn btn-gold" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your original script file -->
    <script src="/static/js/script.js"></script>

    <script>
        // New Functions

        function bookViaWhatsApp() {
            const name = document.getElementById('name').value || "Guest";
            const phone = document.getElementById('phone').value || "";
            const eventDate = document.getElementById('eventDate').value || "Not selected";
            const eventType = document.getElementById('event').value;
            const guests = document.getElementById('guests').value || "N/A";

            const message = `Hello Janta Marriage Lawn!%0A%0A` +
                            `Name: ${name}%0A` +
                            `Phone: ${phone}%0A` +
                            `Event: ${eventType}%0A` +
                            `Date: ${eventDate}%0A` +
                            `Guests: ${guests}%0A%0A` +
                            `I want to book the lawn. Please confirm availability.`;

            window.open(`https://wa.me/917905609115?text=${message}`, '_blank');
        }

        function makePayment() {
            const name = document.getElementById('name').value;
            if (!name) {
                alert("Please enter your name before proceeding to payment.");
                return;
            }
            alert("✅ Redirecting to Secure Payment Gateway...\n\n( Demo - ₹25,000 Advance Payment )");
            // In real project, integrate Razorpay or PhonePe here
            setTimeout(() => {
                document.getElementById('modalMessage').innerHTML = 
                    `Payment of ₹25,000 received successfully!<br>Your booking is confirmed.`;
                new bootstrap.Modal(document.getElementById('successModal')).show();
            }, 1500);
        }

        // Enhanced book() function (called from original button)
        function book() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            if (!name || !phone) {
                alert("Name aur Phone number bharna zaroori hai!");
                return;
            }

            document.getElementById('modalMessage').innerHTML = 
                `Thank you ${name}!<br>Your booking request has been received.`;
            
            new bootstrap.Modal(document.getElementById('successModal')).show();
        }
    </script>
</body>
</html>
